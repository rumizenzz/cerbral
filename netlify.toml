[build]
  publish = "site"
  command = ""

# Clean URLs for the auth flow — /signup, /login, /verify, /onboard, /welcome.
[[redirects]]
  from = "/signup"
  to   = "/signup.html"
  status = 200
[[redirects]]
  from = "/login"
  to   = "/signup.html"
  status = 200
# /check-email and /verify both land back on /signup so the card can
# transform in-place. Supabase's detectSessionInUrl will parse any
# magic-link tokens in the URL hash and fire onAuthStateChange, which
# redirects to /onboard.
[[redirects]]
  from = "/check-email"
  to   = "/signup.html"
  status = 200
[[redirects]]
  from = "/verify"
  to   = "/signup.html"
  status = 200
[[redirects]]
  from = "/onboard"
  to   = "/onboard.html"
  status = 200
[[redirects]]
  from = "/welcome"
  to   = "/welcome.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Auth pages should not be cached aggressively — tokens land here.
[[headers]]
  for = "/signup.html"
  [headers.values]
    Cache-Control = "no-store"
[[headers]]
  for = "/check-email.html"
  [headers.values]
    Cache-Control = "no-store"
[[headers]]
  for = "/onboard.html"
  [headers.values]
    Cache-Control = "no-store"
[[headers]]
  for = "/welcome.html"
  [headers.values]
    Cache-Control = "no-store"
[[headers]]
  for = "/config.js"
  [headers.values]
    Cache-Control = "no-store"
