headersOrigin = "config"
redirectsOrigin = "config"
plugins = []

[functions]

[functions."*"]

[build]
# Relative path so builds work on Netlify's CI (not just locally).
publish = "site"
publishOrigin = "config"
# Generate site/config.js at build time from Netlify env vars.
# See scripts/build-config.sh — reads SUPABASE_URL + SUPABASE_ANON_KEY
# from the Netlify environment and writes a CERBRAL_CONFIG block the
# static pages load on boot. config.js stays gitignored; the open-
# source repo never carries real keys.
command = "bash scripts/build-config.sh"

