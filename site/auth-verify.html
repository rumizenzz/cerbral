<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Use verification code to continue — Cerbral</title>
  <meta name="theme-color" content="#0a0607">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ff6b35'/%3E%3Cstop offset='100%25' stop-color='%23ff3b5c'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext y='.9em' font-size='90' fill='url(%23g)'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="auth-page auth-verify-page">
  <nav class="topbar">
    <div class="container">
      <a class="brand brand-center" href="/">
        <svg class="brand-mark" viewBox="0 0 40 40" aria-hidden="true">
          <defs>
            <linearGradient id="brandGrad" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#ff6b35"/>
              <stop offset="50%" stop-color="#ff4d88"/>
              <stop offset="100%" stop-color="#ff3b5c"/>
            </linearGradient>
          </defs>
          <circle cx="20" cy="20" r="14" fill="none" stroke="url(#brandGrad)" stroke-width="2.4"/>
          <circle cx="20" cy="20" r="5.5" fill="url(#brandGrad)"/>
        </svg>
        <span>Cerbral</span>
      </a>
    </div>
  </nav>

  <main class="verify-main">
    <div class="verify-wrap" id="view-loading">
      <div class="welcome-status">Checking…</div>
    </div>

    <div class="verify-wrap" id="view-code" hidden>
      <h1 class="verify-title">Use verification code to continue</h1>
      <p class="verify-sub">Enter this verification code where you first tried to sign in</p>
      <div class="verify-code" id="big-code">——————</div>
      <button type="button" class="verify-copy-btn" id="copy-code-btn">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path fill="currentColor" d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"/>
        </svg>
        Copy Code
      </button>
    </div>

    <div class="verify-wrap" id="view-error" hidden>
      <h1 class="verify-title">That link has expired.</h1>
      <p class="verify-sub">
        It only works for an hour and for one click. You can send a
        fresh one from <a href="/signup">the sign-in page</a>.
      </p>
    </div>
  </main>

  <script src="/config.js" onerror="console.info('site/config.js not present yet.')"></script>
  <script type="module">
    import { supabase } from '/auth.js';

    // Read the code from the URL hash (fragment — not logged, not in referers).
    // Email template puts it there: /auth/verify#code=690890
    const hash = new URLSearchParams((location.hash || '').replace(/^#/, ''));
    const code = hash.get('code');
    const codeEl   = document.getElementById('big-code');
    const vLoading = document.getElementById('view-loading');
    const vCode    = document.getElementById('view-code');
    const vError   = document.getElementById('view-error');

    if (!code || !/^[A-Za-z0-9]{4,8}$/.test(code)) {
      vLoading.hidden = true;
      vError.hidden = false;
    } else {
      codeEl.textContent = code;
      // Same-browser case: if the user started sign-up in THIS browser,
      // we still have the pending email in localStorage. Try to verify
      // the OTP directly and, on success, redirect to /onboard — the user
      // never has to copy the code.
      const pendingEmail = localStorage.getItem('cerbral:pending_email');
      (async () => {
        if (pendingEmail) {
          try {
            const { error } = await supabase.auth.verifyOtp({
              email: pendingEmail, token: code, type: 'email',
            });
            if (!error) {
              localStorage.removeItem('cerbral:pending_email');
              window.location.replace('/onboard');
              return;
            }
          } catch { /* fall through to code-display below */ }
        }
        // Cross-device / no-pending: show the code to type elsewhere.
        vLoading.hidden = true;
        vCode.hidden = false;
      })();
    }

    document.getElementById('copy-code-btn').addEventListener('click', async (e) => {
      try {
        await navigator.clipboard.writeText(codeEl.textContent);
        e.currentTarget.classList.add('copied');
        e.currentTarget.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied';
        setTimeout(() => {
          e.currentTarget.classList.remove('copied');
          e.currentTarget.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M16 1H4a2 2 0 00-2 2v14h2V3h12V1zm3 4H8a2 2 0 00-2 2v14a2 2 0 002 2h11a2 2 0 002-2V7a2 2 0 00-2-2zm0 16H8V7h11v14z"/></svg> Copy Code';
        }, 1800);
      } catch { /* older browsers */ }
    });
  </script>
</body>
</html>
