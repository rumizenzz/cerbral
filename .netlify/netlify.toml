[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/style.css"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
for = "/auth.css"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
for = "/support/support.css"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

# auth.js changes as the /signup + /onboard flow evolves (e.g. added
# getProfile() for returning-user detection). Keep the cache window
# short so fixes land in-browser without users having to hard-refresh.
[[headers]]
for = "/auth.js"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
for = "/main.js"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
for = "/signup.html"

[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/check-email.html"

[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/onboard.html"

[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/welcome.html"

[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/auth-verify.html"

[headers.values]
Cache-Control = "no-store"

[[headers]]
for = "/config.js"

[headers.values]
Cache-Control = "no-store"

